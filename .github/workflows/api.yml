name: API CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/api/**"

  push:
    branches:
      - main
    paths:
      - "apps/api/**"

permissions:
  contents: read

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Build and Validate API
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Tests
        run: ./gradlew test

      - name: Run Verification
        run: ./gradlew check

      - name: Build Application
        run: ./gradlew build
